# Example: AIR local development stack
#
# Place your copy at ~/.config/mxup/air-dev.yml, then:
#   mxup up air-dev
#   mxup status air-dev
#   mxup restart air-dev:air-backend
#   mxup down air-dev
#
# Switch layouts:
#   mxup layout air-dev compact
#   mxup up air-dev --layout=flat
#
# Parameterize via env vars:
#   DOCKER_PROFILES=agentic-core DOCKER_LOCAL=air-backend mxup up air-dev

session: air-dev

setup: |
  eval "$(direnv export zsh)"
  unset AIR_BACKEND_APP_AUTH__ADDITIONALAUDIENCES

windows:
  docker:
    root: ~/IdeaProjects/jcp-all/docker/cli
    command: >-
      node index.js up
      --profiles=${DOCKER_PROFILES:-agentic-core,ai-management,secrets}
      --local=${DOCKER_LOCAL:-agent-spawner,ai-management,air-backend}

  air-backend:
    root: ~/IdeaProjects/jcp-air/cloud/backend
    wait_for:
      tcp: localhost:5432
      timeout: 120
    env:
      JCP_CONFIG_RESOURCE: /application-local-dev.conf
    command: ./gradlew run

  agent-spawner:
    root: ~/IdeaProjects/jcp-all/agent-spawner
    wait_for: localhost:5432          # shorthand for tcp check
    env:
      JCP_CONFIG_RESOURCE: /application-local-dev.conf
      SPAWNER_SERVICE_IDENTITIES__EXTERNAL__TOKEN_URL: http://authn.docker.localhost/api/rest/oauth2/token
      SPAWNER_SERVICE_IDENTITIES__EXTERNAL__SERVICE_SECRET: jcp-agent-spawner
    command: ./gradlew :run

  ai-management:
    root: ~/IdeaProjects/jcp-all/ai-management
    wait_for: localhost:5432
    env:
      JCP_CONFIG_RESOURCE: /application-local-dev.conf
    command: ./gradlew run

  air-frontend:
    root: ~/IdeaProjects/jcp-air/cloud/frontend
    command: pnpm run dev

  dev-kit:
    root: ~/IdeaProjects/jcp-air/cloud/frontend
    command: npx @jcp/platform-dev-kit --profile=local,dev

  scratch:
    root: ~/IdeaProjects/jcp-air

layouts:
  full:
    services:
      panes: [docker, air-backend, agent-spawner, ai-management]
      split: main-vertical
    frontend:
      panes: [air-frontend, dev-kit]
      split: even-horizontal

  compact:
    all:
      panes: [docker, air-backend, agent-spawner, ai-management, air-frontend, dev-kit]
      split: tiled

  flat: {}
